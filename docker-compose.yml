services:
  db:
    image: pgvector/pgvector:pg16
    platform: linux/amd64
    container_name: qureka-postgres
    environment:
      POSTGRES_DB: lecture_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
